<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="quad-calculator.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Hoover Catapult Calculator</title>
</head>
<body>
    <div class="row">
        <fieldset class="input-group">
            <legend>Y-Intercept</legend>
            <label for="y-intercept-y">Y:</label>
            <input type="number" id="y-intercept-y" name="y-intercept-y" step="1" placeholder="y-coordinate">
        </fieldset>

        <fieldset class="input-group">
            <legend>Vertex</legend>
            <label for="vertex-x">X:</label>
            <input type="number" id="vertex-x" name="vertex-x" step="0.01" placeholder="x-coordinate">
        </fieldset>

        <fieldset class="input-group">
            <legend>Larger X-Intercept</legend>
            <label for="x-intercept-x">X:</label>
            <input type="number" id="x-intercept-x" name="x-intercept-x" step="0.01" placeholder="x-coordinate">
        </fieldset>

        <button type="button" id="calculate-btn" class="calc-btn">Calculate</button>
    </div>

    <div id="output-area" class="output-area" style="display: none;">
        <h2>Results</h2>
        <div class="result-row"><strong>Vertex:</strong> <span id="out-vertex" class="highlight"></span></div>
        <div class="result-row"><strong>Both X-Intercepts:</strong> <span id="out-x-intercepts"></span></div>
        <div class="result-row"><strong>Standard Form:</strong> <span id="out-standard"></span></div>
        <div class="result-row"><strong>Factored Form:</strong> <span id="out-factored"></span></div>
        <div class="result-row"><strong>Vertex Form:</strong> <span id="out-vertex-form"></span></div>
    </div>

    <div id="history-area" class="history-area" style="display: none;">
        <h3 id="history-toggle" class="history-toggle">
            <span id="history-icon">+</span> Prior Results History <span id="history-count"></span>
        </h3>
        <div id="history-content" style="display: none; overflow-x: auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Inputs (y-intercept, h, x-intercept2)</th>
                        <th>Vertex</th>
                        <th>X-Intercepts</th>
                        <th>Standard Form</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
